# Continuous integration for @vantanminh/harness
#
# GitHub is migrating Actions from Node 20 → Node 24 (default on runners as of
# mid-2026; Node 20 removed later in fall 2026). We pin official actions that
# target Node 24 and set FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 for clarity.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
#
# Auto-release flow:
#   1. Push to main → CI runs build-test + auto-tag
#   2. If package.json version changed (no existing tag), auto-tag creates + pushes vX.Y.Z
#   3. Tag push triggers release.yml → npm publish

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Prefer Node 24 runtime for JavaScript actions on the runner.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Product CLI skips update checks in CI via process env CI=true (set by GHA).
  HARNESS_NO_UPDATE_CHECK: "1"

jobs:
  build-test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # engines: >=22.5.0 — cover supported LTS line + current Actions default.
        node-version: ["22.x", "24.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release check
        run: npm run release:check

  # Auto-tag on push to main when package.json version was bumped.
  # Pushing the tag triggers release.yml → npm publish.
  auto-tag:
    name: Auto-tag
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # needed to push the version tag
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - name: Read package version
        id: pkg
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Check if tag already exists
        id: tag
        run: |
          TAG="v${{ steps.pkg.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist — will create."
          fi

      - name: Create and push tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ steps.pkg.outputs.version }}"
          git tag -a "$TAG" -m "Release v${{ steps.pkg.outputs.version }}"
          git push origin "$TAG"
          echo "Pushed tag $TAG — release workflow will publish to npm."
