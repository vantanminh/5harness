# Continuous integration for 5harness (bin: harness)
#
# GitHub is migrating Actions from Node 20 → Node 24 (default on runners as of
# mid-2026; Node 20 removed later in fall 2026). We pin official actions that
# target Node 24 and set FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 for clarity.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
#
# Auto-release flow (push to main only):
#   1. build-test matrix: ubuntu/windows/macos × Node 22.x/24.x (US-035)
#   2. auto-release (ubuntu + Node 24 only): bump → commit + tag → npm publish
#      with OIDC trusted publishing + provenance (US-036 / decision 0018)
#
# npm Trusted Publisher (npmjs.com → package Settings → Trusted Publisher):
#   - GitHub: vantanminh / harness
#   - Workflow filename: ci.yml  (primary auto-release path)
#   - Requires npm CLI ≥ 11.5.1 and id-token: write
# NPM_TOKEN is optional fallback only (transition / emergency local-style publish).
#
# Flake policy: fail-fast is false so all cells report; do not add blind
# retries — fix or quarantine flakes with a tracked story (decision 0018).
#
# Note: GITHUB_TOKEN pushes do not re-trigger workflows, so publish runs in this
# job (not via a separate tag-triggered workflow).
#
# Skip auto-release by including [skip release] in the commit message.
# Manual control: Actions → Release → Run workflow (patch|minor|major).

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Prefer Node 24 runtime for JavaScript actions on the runner.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Product CLI skips update checks in CI via process env CI=true (set by GHA).
  HARNESS_NO_UPDATE_CHECK: "1"

jobs:
  build-test:
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # engines: >=22.5.0 — OS coverage for the global CLI (US-035 / 0018).
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ["22.x", "24.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release check
        run: npm run release:check

  # Auto-bump version, tag, and publish on push to main.
  # Serialized so two concurrent pushes cannot both invent release commits
  # (root cause of local non-fast-forward / package.json merge fights).
  auto-release:
    name: Auto-release
    needs: build-test
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, 'chore(release):') &&
      !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: harness-auto-release-main
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write # OIDC for npm trusted publishing + provenance (US-036)
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Token with contents:write so later push can update main.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: https://registry.npmjs.org
          # Never cache package-manager state for release/publish (npm trusted publishing guidance).
          package-manager-cache: false

      # Trusted publishing needs npm ≥ 11.5.1 (OIDC exchange).
      - name: Ensure npm CLI supports OIDC (≥ 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Sync to latest main before planning release
        run: |
          set -euo pipefail
          git fetch origin main
          # If this workflow run is stale (another push already moved main),
          # rebase onto tip so we release once from the newest tree.
          git pull --rebase origin main || {
            echo "Could not rebase onto origin/main — aborting release for this run."
            git rebase --abort 2>/dev/null || true
            exit 1
          }

      - name: Detect bump kind from commits since last tag
        id: bump
        run: |
          set -euo pipefail
          LAST_TAG="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"
          if [ -n "$LAST_TAG" ]; then
            RANGE="${LAST_TAG}..HEAD"
            echo "Commits since $LAST_TAG:"
            git log --oneline "$RANGE" || true
            SUBJECTS="$(git log --pretty=%s "$RANGE" || true)"
            BODIES="$(git log --pretty=%b "$RANGE" || true)"
          else
            echo "No previous v* tag — defaulting to patch."
            SUBJECTS=""
            BODIES=""
          fi

          # Conventional-commit style detection (best-effort).
          # BREAKING / type!: → major; feat: → minor; else → patch.
          KIND="patch"
          if echo "$SUBJECTS" | grep -Eiq '^[a-z]+(\([^)]+\))?!:' \
            || echo "$BODIES" | grep -Eiq '^BREAKING CHANGE:'; then
            KIND="major"
          elif echo "$SUBJECTS" | grep -Eiq '^feat(\([^)]+\))?:'; then
            KIND="minor"
          fi

          # Allow override via marker in head commit message.
          HEAD_MSG="${{ github.event.head_commit.message }}"
          if echo "$HEAD_MSG" | grep -Eiq '\[release:[[:space:]]*major\]'; then
            KIND="major"
          elif echo "$HEAD_MSG" | grep -Eiq '\[release:[[:space:]]*minor\]'; then
            KIND="minor"
          elif echo "$HEAD_MSG" | grep -Eiq '\[release:[[:space:]]*patch\]'; then
            KIND="patch"
          fi

          echo "kind=$KIND" >> "$GITHUB_OUTPUT"
          echo "Detected bump kind: $KIND"

      - name: Plan release (skip / tag-only / bump)
        id: plan
        run: |
          set -euo pipefail
          # release-plan.mjs prints key=value lines; last line is version.
          OUT="$(node scripts/release-plan.mjs --kind "${{ steps.bump.outputs.kind }}")"
          echo "$OUT"
          # Avoid pipe subshell so GITHUB_OUTPUT is written in this shell.
          while IFS= read -r line; do
            case "$line" in
              skip=*|mode=*|version=*|kind=*|reason=*)
                echo "$line" >> "$GITHUB_OUTPUT"
                ;;
            esac
          done <<< "$OUT"

      - name: Skip when already released
        if: steps.plan.outputs.skip == 'true'
        run: |
          echo "Skipping auto-release: ${{ steps.plan.outputs.reason }}"

      - name: Bump version (when needed)
        id: version
        if: steps.plan.outputs.skip != 'true'
        run: |
          set -euo pipefail
          MODE="${{ steps.plan.outputs.mode }}"
          if [ "$MODE" = "bump" ]; then
            NEW="$(node scripts/bump-version.mjs "${{ steps.bump.outputs.kind }}" | tail -n1)"
          else
            # tag-only: package.json already ahead of last tag — keep version
            NEW="$(node -p "require('./package.json').version")"
            echo "tag-only mode — publishing existing version $NEW"
          fi
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW"

      - name: Release check (post-bump)
        if: steps.plan.outputs.skip != 'true'
        run: npm run release:check

      - name: Commit, tag, and push (rebase-retry)
        if: steps.plan.outputs.skip != 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          # Rebase-retry push permanently avoids non-fast-forward races on main.
          node scripts/git-push-release.mjs \
            --tag "$TAG" \
            --message "chore(release): ${VERSION}"
          echo "Pushed release $TAG"

      # OIDC is preferred (id-token: write). NODE_AUTH_TOKEN is optional fallback
      # if trusted publisher is not yet configured on npmjs.com.
      - name: Publish to npm (OIDC + provenance)
        if: steps.plan.outputs.skip != 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build release notes
        if: steps.plan.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # Human CHANGELOG is primary; --with-export appends durable-history assist (US-038).
          node scripts/release-notes.mjs "${{ steps.version.outputs.version }}" --with-export --out release-notes.md
          echo "--- release notes preview ---"
          head -n 40 release-notes.md || true

      # Optional SBOM (US-036): SPDX from lockfile; attach to GitHub Release for consumers.
      - name: Generate SBOM (SPDX)
        if: steps.plan.outputs.skip != 'true'
        run: |
          set -euo pipefail
          npm sbom --sbom-format spdx --package-lock-only > sbom.spdx.json
          test -s sbom.spdx.json
          echo "SBOM bytes: $(wc -c < sbom.spdx.json)"

      - name: Create GitHub Release
        if: steps.plan.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          # Idempotent if release already exists (re-run / race).
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — updating notes + assets."
            gh release edit "$TAG" --notes-file release-notes.md
            gh release upload "$TAG" sbom.spdx.json --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file release-notes.md \
              --verify-tag \
              sbom.spdx.json
          fi
