# Publish @vantanminh/harness to npm when a version tag is pushed.
#
# Triggered by:
#   - Manual:   git tag vX.Y.Z && git push origin vX.Y.Z
#   - Auto:     ci.yml auto-tag job creates + pushes vX.Y.Z on push to main
#               when package.json version was bumped (no existing tag).
#
# Prerequisites (repo Settings → Secrets and variables → Actions):
#   NPM_TOKEN — Automation or granular access token with publish rights
#               for @vantanminh/harness (and package create if first publish).
#
# Tag convention: vX.Y.Z must match package.json version (e.g. v0.9.3).
#
# Node 24 Actions runtime: same migration notes as ci.yml.

name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HARNESS_NO_UPDATE_CHECK: "1"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Require NPM_TOKEN secret
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error title=Missing NPM_TOKEN::Add repo secret NPM_TOKEN (npm Automation or granular publish token), then re-run this workflow or push the tag again."
            echo "GitHub → Settings → Secrets and variables → Actions → New repository secret"
            echo "Name: NPM_TOKEN"
            echo "Or publish locally: npm publish --access public"
            exit 1
          fi
          echo "NPM_TOKEN is present (value not printed)."

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: npm
          registry-url: https://registry.npmjs.org
          scope: "@vantanminh"

      - name: Install dependencies
        run: npm ci

      - name: Release check
        run: npm run release:check

      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag version ($TAG) does not match package.json ($PKG)"
            exit 1
          fi
          echo "Publishing @vantanminh/harness@$PKG"

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
