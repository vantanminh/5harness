# Publish 5harness (bin: harness) to npm.
#
# Triggers:
#   1. Tag push vX.Y.Z  (manual: git tag vX.Y.Z && git push origin vX.Y.Z)
#      — only runs when the tag is pushed by a user/PAT (GITHUB_TOKEN tag
#      pushes from CI do not re-trigger workflows; CI auto-release publishes
#      inline instead).
#   2. workflow_dispatch — bump version (patch|minor|major), commit, tag, publish
#
# Authentication (US-036 / decision 0018):
#   Preferred: npm Trusted Publishing (OIDC) + automatic provenance.
#   Configure on npmjs.com → package Settings → Trusted Publisher:
#     - Organization/user: vantanminh
#     - Repository: 5harness
#     - Workflow filename: release.yml  (when using this workflow)
#   Note: npm allows one trusted publisher workflow per package. Primary
#   auto-release uses ci.yml; for manual/tag publishes via this file, either
#   switch the trusted publisher to release.yml or set optional NPM_TOKEN.
#   Requires npm CLI ≥ 11.5.1 and job permission id-token: write.
#
# Tag convention: vX.Y.Z must match package.json version (e.g. v0.9.11).
#
# Node 24 Actions runtime: same migration notes as ci.yml.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump kind"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write # OIDC for npm trusted publishing + provenance (US-036)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HARNESS_NO_UPDATE_CHECK: "1"

jobs:
  # Manual release from Actions UI: bump → commit + tag → publish.
  manual-release:
    name: Manual release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Ensure npm CLI supports OIDC (≥ 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        id: version
        run: |
          set -euo pipefail
          NEW="$(node scripts/bump-version.mjs "${{ inputs.bump }}" | tail -n1)"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW"

      - name: Release check
        run: npm run release:check

      - name: Commit and tag
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # CHANGELOG.md may be promoted from [Unreleased] by bump-version (US-038).
          git add package.json package-lock.json src/version.ts templates/AGENTS.md AGENTS.md CHANGELOG.md
          git commit -m "chore(release): ${VERSION}"
          git tag -a "$TAG" -m "Release ${TAG}"
          git push origin HEAD:main
          git push origin "$TAG"
          echo "Pushed commit + tag $TAG"

      - name: Publish to npm (OIDC + provenance)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          NAME="$(node -p "require('./package.json').name")"
          VER="$(node -p "require('./package.json').version")"
          if npm view "${NAME}@${VER}" version >/dev/null 2>&1; then
            echo "npm already has ${NAME}@${VER} — skip publish"
            exit 0
          fi
          npm publish --access public --provenance

      - name: Build release notes
        run: |
          set -euo pipefail
          # Human CHANGELOG is primary; --with-export appends durable-history assist (US-038).
          node scripts/release-notes.mjs "${{ steps.version.outputs.version }}" --with-export --out release-notes.md

      - name: Generate SBOM (SPDX)
        run: |
          set -euo pipefail
          npm sbom --sbom-format spdx --package-lock-only > sbom.spdx.json
          test -s sbom.spdx.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file release-notes.md
            gh release upload "$TAG" sbom.spdx.json --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file release-notes.md \
              --verify-tag \
              sbom.spdx.json
          fi

  # Tag-triggered publish (manual git tag from a developer machine / PAT).
  publish:
    name: Publish to npm
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Ensure npm CLI supports OIDC (≥ 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Release check
        run: npm run release:check

      - name: Verify tag matches package version
        id: version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag version ($TAG) does not match package.json ($PKG)"
            exit 1
          fi
          echo "version=$PKG" >> "$GITHUB_OUTPUT"
          echo "Publishing 5harness@$PKG"

      - name: Publish to npm (OIDC + provenance)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          NAME="$(node -p "require('./package.json').name")"
          VER="$(node -p "require('./package.json').version")"
          if npm view "${NAME}@${VER}" version >/dev/null 2>&1; then
            echo "npm already has ${NAME}@${VER} — skip publish"
            exit 0
          fi
          npm publish --access public --provenance

      - name: Build release notes
        run: |
          set -euo pipefail
          # Human CHANGELOG is primary; --with-export appends durable-history assist (US-038).
          node scripts/release-notes.mjs "${{ steps.version.outputs.version }}" --with-export --out release-notes.md

      - name: Generate SBOM (SPDX)
        run: |
          set -euo pipefail
          npm sbom --sbom-format spdx --package-lock-only > sbom.spdx.json
          test -s sbom.spdx.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          # Idempotent: tag-triggered re-runs may already have a Release.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — updating notes + assets."
            gh release edit "$TAG" --notes-file release-notes.md
            gh release upload "$TAG" sbom.spdx.json --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file release-notes.md \
              --verify-tag \
              sbom.spdx.json
          fi
